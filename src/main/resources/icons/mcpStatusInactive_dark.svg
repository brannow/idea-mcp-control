<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- MCP hub-and-spoke: center node connected to 4 outer nodes (inactive: all stroked, no fill) -->
  <!-- Edges -->
  <line x1="8" y1="8" x2="3.5" y2="3.5" stroke="#CED0D6" stroke-linecap="round" opacity="0.5"/>
  <line x1="8" y1="8" x2="12.5" y2="3.5" stroke="#CED0D6" stroke-linecap="round" opacity="0.5"/>
  <line x1="8" y1="8" x2="12.5" y2="12.5" stroke="#CED0D6" stroke-linecap="round" opacity="0.5"/>
  <line x1="8" y1="8" x2="3.5" y2="12.5" stroke="#CED0D6" stroke-linecap="round" opacity="0.5"/>
  <!-- Outer nodes -->
  <circle cx="3.5" cy="3.5" r="1.5" stroke="#CED0D6" fill="none" opacity="0.5"/>
  <circle cx="12.5" cy="3.5" r="1.5" stroke="#CED0D6" fill="none" opacity="0.5"/>
  <circle cx="12.5" cy="12.5" r="1.5" stroke="#CED0D6" fill="none" opacity="0.5"/>
  <circle cx="3.5" cy="12.5" r="1.5" stroke="#CED0D6" fill="none" opacity="0.5"/>
  <!-- Center node -->
  <circle cx="8" cy="8" r="1.5" stroke="#CED0D6" fill="none" opacity="0.5"/>
</svg>
