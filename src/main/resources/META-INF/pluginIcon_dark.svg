<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- MCP Control: hub-and-spoke network on a rounded dark background -->
  <rect x="2" y="2" width="36" height="36" rx="8" fill="#2B2D30"/>
  <!-- Edges -->
  <line x1="20" y1="20" x2="10" y2="10" stroke="#CED0D6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="20" x2="30" y2="10" stroke="#CED0D6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="20" x2="30" y2="30" stroke="#CED0D6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="20" x2="10" y2="30" stroke="#CED0D6" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Outer nodes (stroke only) -->
  <circle cx="10" cy="10" r="3.5" stroke="#CED0D6" stroke-width="1.5" fill="#2B2D30"/>
  <circle cx="30" cy="10" r="3.5" stroke="#CED0D6" stroke-width="1.5" fill="#2B2D30"/>
  <circle cx="30" cy="30" r="3.5" stroke="#CED0D6" stroke-width="1.5" fill="#2B2D30"/>
  <circle cx="10" cy="30" r="3.5" stroke="#CED0D6" stroke-width="1.5" fill="#2B2D30"/>
  <!-- Center hub (filled) -->
  <circle cx="20" cy="20" r="4" fill="#CED0D6"/>
</svg>
