<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- MCP Hub: hub-and-spoke network on a rounded background -->
  <rect x="2" y="2" width="36" height="36" rx="8" fill="#F5F5F5"/>
  <!-- Edges -->
  <line x1="20" y1="20" x2="10" y2="10" stroke="#6C707E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="20" x2="30" y2="10" stroke="#6C707E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="20" x2="30" y2="30" stroke="#6C707E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="20" x2="10" y2="30" stroke="#6C707E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Outer nodes (stroke only) -->
  <circle cx="10" cy="10" r="3.5" stroke="#6C707E" stroke-width="1.5" fill="#F5F5F5"/>
  <circle cx="30" cy="10" r="3.5" stroke="#6C707E" stroke-width="1.5" fill="#F5F5F5"/>
  <circle cx="30" cy="30" r="3.5" stroke="#6C707E" stroke-width="1.5" fill="#F5F5F5"/>
  <circle cx="10" cy="30" r="3.5" stroke="#6C707E" stroke-width="1.5" fill="#F5F5F5"/>
  <!-- Center hub (filled, accent color from IntelliJ action palette) -->
  <circle cx="20" cy="20" r="4" fill="#6C707E"/>
</svg>
